<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Exportador</title><script src='https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js'></script></head><body style='font-family:Arial;text-align:center;margin-top:60px'><h2>Exportador da Rifa</h2><button id='btn'>📊 Exportar Excel</button><p id='status'></p><script type='module'>
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore,collection,getDocs } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyAvGJJFjZjb9Sb53-4La4n4TU-Iq83_N30',authDomain:'rifa-medicina-marlon.firebaseapp.com',projectId:'rifa-medicina-marlon',storageBucket:'rifa-medicina-marlon.firebasestorage.app',messagingSenderId:'317096652330',appId:'1:317096652330:web:55661f1154c784dccbdd53'};
const app=initializeApp(firebaseConfig);const db=getFirestore(app);
btn.onclick=async()=>{status.textContent='Exportando...';try{const s=await getDocs(collection(db,'compras_rifa'));const dados=[];s.forEach(doc=>{const d=doc.data();dados.push({Nome:d.nome||'',Telefone:d.telefone||'',Quantidade:d.quantidade||'',Numeros:(d.numeros||[]).join(', '),Data:d.data_compra?d.data_compra.toDate().toLocaleString('pt-BR'):''});});const ws=XLSX.utils.json_to_sheet(dados);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Compradores');XLSX.writeFile(wb,'Compradores_Rifa.xlsx');status.textContent='Concluído!';}catch(e){status.textContent=e.message;console.error(e);}};
</script></body></html>
